<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>短视频大屏版 - 授权登录成功</title>
    <style>
        :root {
            --douyin-red: #FE2C55;
            --douyin-blue: #25F4EE;
            --bg-dark: #0B0C10;
            --card-bg: rgba(255, 255, 255, 0.04);
            --text-light: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 炫酷的光晕背景 */
        .glow-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: 1;
        }

        .glow-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 8s ease-in-out infinite alternate;
        }

        .glow-circle-1 {
            width: 400px;
            height: 400px;
            background: var(--douyin-red);
            top: -100px;
            left: -100px;
        }

        .glow-circle-2 {
            width: 450px;
            height: 450px;
            background: var(--douyin-blue);
            bottom: -150px;
            right: -100px;
            animation-delay: -3s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 30px) scale(1.1); }
        }

        /* 登录卡片 */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 60px 40px;
            border-radius: 32px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 立体发光LOGO */
        .logo-box {
            position: relative;
            width: 90px;
            height: 90px;
            margin: 0 auto 35px;
        }

        .logo-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            background: linear-gradient(135deg, var(--douyin-red), var(--douyin-blue)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            box-shadow: 0 0 25px rgba(37, 244, 238, 0.4);
        }

        .logo-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            width: 42px;
            height: 42px;
            fill: #ffffff;
            filter: drop-shadow(-2px -1px 0px var(--douyin-blue)) drop-shadow(2px 1px 0px var(--douyin-red));
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff 60%, rgba(255, 255, 255, 0.7));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.55);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* 成功徽章 */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 50px;
            background: rgba(37, 244, 238, 0.08);
            border: 1px solid rgba(37, 244, 238, 0.2);
            color: var(--douyin-blue);
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 10px rgba(37, 244, 238, 0.1);
                border-color: rgba(37, 244, 238, 0.2);
            }
            100% {
                box-shadow: 0 0 20px rgba(37, 244, 238, 0.3);
                border-color: rgba(37, 244, 238, 0.5);
            }
        }

        .footer-note {
            margin-top: 50px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="glow-bg">
        <div class="glow-circle glow-circle-1"></div>
        <div class="glow-circle glow-circle-2"></div>
    </div>

    <div class="container">
        <div class="logo-box">
            <div class="logo-ring"></div>
            <div class="logo-icon">
                <!-- 短视频经典的音符 SVG 图标 -->
                <svg viewBox="0 0 24 24">
                    <path d="M12 2v14c0 1.66-1.34 3-3 3s-3-1.34-3-3 1.34-3 3-3c.4 0 .77.09 1.12.24V7.5C10.12 7.14 12 5.5 12 2h3.5v3.5c-1 0-2 1-2 2v9.5c0 3.04-2.46 5.5-5.5 5.5S2.5 20.04 2.5 17s2.46-5.5 5.5-5.5c.34 0 .68.03 1 .09V4.5c0-1.38 1.12-2.5 2.5-2.5H12z"/>
                </svg>
            </div>
        </div>

        <h1>登录授权成功</h1>
        <p>已将您的临时安全验证令牌 (Code) 成功传递至 Apple TV 客户端，电视端即将为您自动登录。</p>

        <div class="badge">
            <svg style="width:16px;height:16px;fill:currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
            </svg>
            连接已建立，请在电视端查看
        </div>

        <div class="footer-note">
            短视频 TV 版客户端安全认证中心 &copy; 2026
        </div>
    </div>
</body>
</html>
