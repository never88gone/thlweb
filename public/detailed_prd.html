## 2. 战略与业务目标 (Business Value)
### 2.1 行业现状与市场痛点
在大屏终端上，由于官方交互规范的限制，生态内长期缺乏真正好用的网页浏览器。现有痛点如下：

1. **输入困难**：网页内容繁杂，依靠原生遥控器的触控板去模拟光标移动极易断触、漂移，体验反人类。
2. **缺乏定制**：许多用户尝试用电视访问短视频网站，但网页自身播放器无法与遥控器按键完美契合，缺乏快捷全屏、快捷翻页的能力。
3. **闭环破裂**：要在电视上输入长网址或未来拓展复杂配置，若无极简交互手段，极易导致流失。

### 2.2 市场调研与合规可行性

1. **市场空白与竞品分析**：目前官方应用商店实际上处于“真·浏览器”的真空状态。虽然存在极少数宣称为“浏览器”的应用，但其实际核心体验极差，导致大量用户给出差评。这证明了**用户在大屏端对浏览器的真实需求极其旺盛，但市场有效供给完全断层**。
2. **上架合规可行性**：官方审核政策虽不鼓励上架纯粹的开放式浏览器，但通过调研发现，许多应用通过内嵌系统级浏览器内核来承载网页内容，均能顺利通过审核。本项目通过“效率工具与定制播放”进行产品形态包装，风险完全可控。

### 2.3 商业模式与产品规划路线图

- **1 期 (MVP 核心切入点)**：主打基础浏览、多外设适配、视频全屏沉浸嗅探。采用**付费买断制**进行快速变现，并通过核心社群完成冷启动。
- **2 期 (商业化护城河)**：作为核心增值服务，引入**自动化规则引擎、跨端扫码同步**，以及高级手柄按键自定义、云端规则社区等高阶极客体验。采用**内购订阅制**提升产品生命周期的长尾收入。

### 2.4 核心数据指标 (KPIs)

1. **核心路径转化时长**：用户从打开目标网站到成功进入全屏沉浸播放的时间间隔（目标 < 3s）。
2. **多设备连通率**：使用过 iOS 虚拟遥控器或蓝牙手柄操作过的活跃设备占比（目标 > 25%）。
3. **用户留存率**：次日留存目标 40%，7 日留存目标 20%。
4. **二期转化率预估**：未来引入自动化规则等高级功能后，免费/买断用户向订阅制的转化意愿比例。

## 3. 目标用户与使用场景

### 3.1 核心用户画像

| 画像类型 | 属性特征 | 核心诉求 | 痛点 |
|---------|---------|---------|------|
| **大屏重度消费型 (一期核心)** | 年轻人、爱宅家、高频消费短视频与流媒体 | 想要躺在沙发上，用最简单的按键操作无缝刷视频 | 网页视频广告多，且遥控器点不到“全屏”按钮 |
| **效率/自动化极客 (二期发力)** | 懂技术、热衷于折腾软路由与自动化设定 | 追求极致的定制化，喜欢掌控设备的每一个细节 | 现有的电视应用像黑盒，无法自定义规则 |

### 3.2 典型使用场景分析

1. **场景一：无痛沉浸式刷短视频**
   - *动作*：用户下班回家，打开应用访问预设的短视频网页版。
   - *系统响应*：视频加载完毕后，系统嗅探到视频流并**强制接管为原生全屏**。
   - *结果*：用户仅需按遥控器的“上/下”物理按键，系统自动映射为翻页逻辑，实现与手机端一致的无缝切换。

2. **场景二：跨端光速投递规则 (二期规划)**
   - *动作*：极客用户在社群发现一段“跳过特定网站验证码”的优秀规则。
   - *系统响应*：用户打开电视端的“新增规则”，扫码后手机弹出投递页。粘贴内容，点击发送。
   - *结果*：电视端即时完成超快局域网传输并保存，下次访问目标网站瞬间生效。

3. **场景三：针对特殊网站的极限调教 (二期规划)**
   - *动作*：用户访问一个排版极其复杂的老旧论坛，系统默认焦点完全失效。
   - *系统响应*：用户针对该论坛域名，单独将光标模式强行切换为“模拟鼠标”。
   - *结果*：用户通过模拟鼠标顺利点击了原本无法选中的分页按钮。

## 4. 全局架构与系统流程

### 4.1 系统主干执行逻辑

```mermaid
flowchart TD
    A["启动应用"] --> B["加载首页容器"]
    B --> C["用户输入网址或点击书签"]
    C --> D["核心引擎开始加载目标网页"]
    
    D --> G["加载全局极客设置 (如默认光标模式)"]
    
    G --> H{"页面状态持续监听"}
    
    H -->|"嗅探到大面积视频流"| J["启动播放器底层接管机制"]
    H -->|"普通网页内容"| I["全权交接给网页引擎进行浏览操作"]
    
    J --> K["拉起电视原生全屏播放器"]
    K --> L["彻底阻断网页焦点, 多端控制器深度接管"]
```

### 4.2 焦点拦截与分发状态机

| 页面/模块状态 | 触发条件 | 界面/交互表现 | 退出机制 |
|-------------|---------|------------|---------|
| **首次启动态** | 杀后台后首次冷启动 | 拦截默认落入底部导航的情况，强制将焦点移交至网页内容区，确保一进去就能浏览。 | 无 (长效生效) |
| **沉浸浏览态** | 正常浏览网页 | 焦点完全由网页接管，遥控器触控板映射为光标滑动。 | 呼出高级控制菜单 |
| **底部导航态** | 轻按菜单键或悬浮手势 | 焦点移交底部导航面板，选中项略微放大并增加高光阴影。 | 选择网页区或返回 |
| **全屏视频态** | 视频被成功接管放大 | 彻底屏蔽网页焦点，仅响应四大物理按键宏操作。 | 触发返回退出全屏 |

## 5. 核心功能模块详细说明 (一期)
> 本节涵盖了 MVP 阶段所有的核心功能边界。严禁加入任何技术栈黑话。

### 5.1 全局框架与路由导航
**功能说明**：采用经典的底部导航架构，确保用户在核心功能间实现零认知成本穿梭。

**模块划分细则**：

1. **首页容器**：
   - 核心网页承载页。包含置顶的半透明地址输入栏。
   - **加载进度条**：在地址栏下方或网页顶部边缘，必须提供细长的网页加载进度条（如 Safari 经典的蓝色进度条），实时反映当前页面的加载状态，加载完成后自动隐藏。
   - 若无浏览任务，展示默认的快捷导航九宫格（常用书签入口）。

2. **收藏夹**：
   - 瀑布流/列表形式展示收藏的站点，支持首字母检索或按时间排序。
   - 电视端点击直接跳转首页加载；长按支持删除或编辑标题。

3. **历史记录**：
   - 记录近 30 天的网页浏览历史。
   - 聚合相同域名的访问记录，提供一键清空全部历史的按钮。

4. **设置分发中心**：
   - 极客配置的最高分发中心，分形出多个次级设置页面（详见 5.4 节）。

### 5.2 核心浏览器引擎与多端外设控制
**需求背景**：大屏浏览器的操作天花板极低，必须通过穷尽所有可能的物理外设来抬高操作下限。

**业务逻辑**：

1. **多外设事件拦截层**：
   - **原生遥控器**：处理基础的焦点滑动与点击。特别强调：针对 Siri Remote 的中心触控板，引入了底层的持续滑动事件捕获（Touch Tracking）。在网页浏览态下，将离散的“块状焦点跳跃”转化为连续的“自由光标拖拽”。
   - **手机虚拟遥控器**：深度集成手机控制中心的虚拟遥控器，适配其特殊的滑动加速度反馈。
   - **外接游戏手柄**：支持蓝牙连接主流游戏手柄。摇杆映射光标移动，特定实体键映射页面点击、返回、快捷全屏等高频操作。

2. **沉浸式高级控制菜单 (Advanced Menu)**：
   - **触发手势**：在网页浏览状态下，**双击遥控器“播放/暂停”物理按键**，屏幕中央淡入磨砂玻璃质感的高级控制菜单。
   - **核心包含项**：网页刷新、上一个网站 (后退)、下一个网站 (前进)、视频全屏接管、加入/移除收藏。（二期预留接入规则面板）
   - **扩展性设计要求**：菜单的底层架构必须采用高度可扩展的流式布局或横向滚动网格布局 (Scrollable Row)。确保后续二期引入新功能按钮时无缝接入。

### 5.3 视频播放拦截与深度定制 
**需求背景**：网页自身的播放器按键极小，极难点按，必须转化为原生全屏。

**业务逻辑**：

1. **智能嗅探与防冲突机制**：
   - 系统持续轮询网页中媒体流的尺寸。若存在多个流（如贴片广告），仅锁定位于屏幕可视区域内、且渲染面积最大的主视频为目标。

2. **强制接管与环境清理**：
   - 锁定目标后，立即拉起基于电视原生的全屏播放器。
   - 静音原网页所有音频通道，防止残留背景音打扰播放体验。

3. **物理按键与手势底层映射 (全屏态)**：

   | 物理操作指令 | 短视频模式映射 | 长视频模式映射 |
   |------------|--------------|--------------|
   | **上/下滑动** | 翻页 (上一条/下一条) | 屏蔽防误触 |
   | **左/右滑动** | 屏蔽防误触 | 快捷快进/快退 (跳跃 10s) |
   | **双击触控板** | 触发双击点赞 | 切换画面裁切比例 (适应/拉满) |
   | **长按播放键** | 长按开启 2.0 倍速快放 | 长按开启 2.0 倍速快放 |

### 5.4 全局极客设置矩阵
由设置分发中心统一管理，满足硬核用户的全部探索欲：

1. **操作控制**：
   - **光标模式引擎**：支持多种模式切换（系统焦点原生模式 / 自由滑鼠模式）。
     - *自由滑鼠模式细节*：利用 Siri Remote 中间触控板，将手指的真实物理滑动按原生比例映射为屏幕内一个圆形“自由光标”的连续滑动。彻底突破大屏焦点只能在大型区块间“跳跃”的限制，带来如同笔记本触摸板一般的丝滑、高精度点选体验。
   - **默认搜索引擎**：内置多种主流搜索引擎，供地址栏直搜使用。

2. **数据清理模块**：
   - 支持可视化查看目前各类缓存占用的存储空间，提供一键清理能力，释放老旧设备的存储压力。

3. **悬浮时钟控制**：
   - 考虑到全屏观影容易丢失时间概念，提供在屏幕右上角显示极简半透明数字时钟的全局开关，且支持自动防烧屏位移。

### 5.5 帮助与支持体系
保障产品正规化、商业化的基石模块：

1. **用户教育**：内置图文并茂的使用指南，降低新用户门槛。
2. **合规文档**：内置隐私协议，应对严苛的隐私审查。
3. **版本迭代**：展示每次更新的修复日志与彩蛋。
4. **商业矩阵**：增加应用推荐模块，为开发者名下其他产品进行互相导流。

### 5.6 全局模块空态页面规范 (Empty States)
为了保证大屏体验的完整性，当用户尚未产生数据时，必须提供清晰的空态引导，绝不允许出现纯黑屏或无提示的留白：

1. **首页空态**：当用户未设置默认主页或未打开任何网页时，居中展示“快捷导航栏”与“热门书签九宫格”。
2. **收藏夹空态**：展示插画图标及文案“暂无收藏”，并在下方提供操作提示：“在浏览网页时，唤出高级菜单即可加入收藏”。
3. **历史记录空态**：展示插画图标及文案“暂无浏览历史”。

## 6. tvOS 专属交互与焦点设计规范 (HIG & Focus Specifications)
> 电视端应用与移动端最大的区别在于“焦点 (Focus)”。必须严格遵循 Apple 的官方大屏交互规范以保证纯正的原生体验。

### 6.1 焦点视觉反馈 (Visual Cues)

- **视差效果 (Parallax)**：所有可交互的层级（如图标、卡片）在获取焦点时，必须有 1.1 倍的放大效果，并伴随微弱的白色发光阴影与 3D 悬浮视差。
- **不可达反馈 (Edge Bounce)**：当用户滑动到无可聚焦元素的边界时，界面必须产生轻微的“边缘回弹 (Bouncing)”动画。

### 6.2 焦点争夺与记忆机制 (Focus Retention)

- **焦点记忆**：跳转页面再返回时，系统必须记住离开时聚焦的最后一张卡片，而非重置到第一张。
- **声音反馈**：所有焦点的转移，必须调用系统级的导航音效（Navigation Clicks）。

### 6.3 遥控器安全区限制 (Safe Area)

- **内容边距**：网页内容与系统悬浮界面，必须严格避开屏幕四周的过扫描安全区 (Overscan Safe Area)，防止在老旧电视型号上内容被裁切。

## 7. 二期商业化需求池 (订阅制独占)
> 本节记录未来作为高利润增长引擎的核心功能池。

1. **自动化规则与跨端局域网同步 (杀手级功能)**：
   - **跨端扫码同步引擎**：电视端生成局域网二维码，手机扫码后进入极简投递网页发送代码片段，电视端即时接收并落盘保存。
   - **网站独立配置池**：允许用户为特定域名（如 `*.douyin.com`）绑定专属自动化规则与独立的光标模式，实现“千网千面”。
   - **匹配与生效机制**：在网页主体结构完全加载完毕后，沙盒内静默注入自动化规则。

2. **验证码辅助拖拽模式**：
   - 针对滑块验证码，通过网页元素捕获，锁定原生视图，呼出超大尺寸横向辅助拖拽轨道。用户长按并左右滑动即可实现高精度物理过检。

3. **高级游戏手柄按键自定义**：
   - 允许高阶用户自由定义手柄的每一个按键行为（例如设定特定按键触发特定网站规则）。

4. **云端官方规则社区**：
   - 构建官方维护的规则仓库，用户在应用内一键浏览、下载热门网站的适配规则，彻底消除跨端扫码的使用门槛。

5. **界面自定义模块 (个性化特权)**：
   - **主题色**：支持浅色/深色/系统跟随。
   - **桌面图标动态切换**：内置 5 种精美应用图标，允许用户动态替换系统主界面的展示图标。

6. **硬核性能监控系统 (极客特权)**：
   - **监控开关与频率**：控制是否开启底层性能轮询及轮询频率。
   - **可视化折线图**：实时绘制应用内存占用 vs 系统可用内存的水位图。
   - **底层诊断日志**：抓取并展示页面崩溃等异常记录，打破电视应用黑盒限制。

为了验证商业存活率，需完善以下行为日志埋点策略：

| 事件大类 | 业务动作描述 | 核心携带参数 | 业务价值验证点 |
|---------|--------------------|------------------------|--------------|

## 9. 非功能性与合规边界需求

### 9.1 性能与资源红线

1. **内存防火墙**：由于硬件限制，单个进程内存若飙升过快极易引发内存溢出崩溃。若发现总内存剩余不足，应强制挂起后台页面。

### 9.2 安全与审核合规

1. **内容绝对隔离**：本产品定位为“开放式工具”，绝对禁止预置、聚合、抓取任何第三方版权视频平台内容。

### 9.3 设备与系统兼容性

- **系统要求**：向下兼容至发布起近五年的主流系统版本。
- **遥控器向下兼容**：完美适配第一代黑色触控版与第二代银色铝合金版的不同段落反馈。

---

## 10. 异常流与极端边界处理

1. **网页加载失败兜底 (Loading Failure)**：
   - *场景*：由于弱网、DNS 污染或服务器崩溃导致网页持续白屏。
   - *策略*：加载超过 15 秒未响应，必须强行中断流程。并在屏幕中央弹出重试面板（提示“网络似乎睡着了”），强行将焦点转移至该面板防卡死。

2. **局域网跨端断流保护 (二期规划)**：
   - *策略*：电视端若超时未接收到完整局域网投递数据，直接抛弃缓冲区残留，强制重置状态，杜绝保存破损文件。

3. **自动化规则并发与失效兜底 (二期规划)**：
   - *策略*：规则执行失败必须在后台被**完全静默捕获**，绝不在浏览屏幕上弹窗。仅在呼出控制菜单时，在对应的规则名称旁显示轻微警告 (⚠️) 提示更新。

## 11. 核心功能详细操作流

### 11.1 视频沉浸式接管操作流 (一期核心)
**业务诉求**：将网页难以操作的视频区域，平滑无感地替换为原生全屏播放器。

**用户交互与判定逻辑**：

```mermaid
sequenceDiagram
    participant U as 电视用户
    participant Web as 网页视图
    participant Sys as 系统接管控制层
    participant Player as 原生全屏播放器
    
    U->>Web: 访问包含视频的网页
    Sys->>Web: 持续监测网页内的媒体元素
    Web->>Sys: 网页视频开始加载/播放
    
    alt 监测到视频流，且处于主视觉区
        Sys->>Sys: 判定为页面主视频
        alt 确认为主视频
            Sys->>Web: 强制暂停原网页视频并静音隐藏多余元素
            Sys->>Player: 提取视频源，启动原生播放器
            Player->>U: 画面瞬间放大至全屏接管
        else 确认为边缘广告视频
            Sys->>Sys: 忽略接管请求
        end
    end
```

### 11.2 遥控器焦点争夺控制流 (一期核心)
**业务诉求**：系统默认焦点容易乱跳，导致“遥控器失灵”。

**产品规则指引**：

- **状态 A（浏览网页时）**：遥控器控制权 100% 锁死在网页上，滑动只作用于网页本身，不滑落至底部菜单栏。
- **状态 B（呼出高级菜单时）**：双击播放键唤出高级菜单后，控制权瞬间从网页抽离，锁定在菜单上。
- **平滑过渡**：菜单消失时，控制权无缝交还网页。

### 11.3 跨端扫码同步操作流 (二期规划)
**业务诉求**：保证电视与手机在家庭网络下极简完成代码投递。

**交互流转**：电视开启接收通道 -> 居中展示二维码 -> 手机扫码获取投递页 -> 发送数据 -> 电视端加密落盘并关闭通道。

### 11.4 网站级配置分发判定流 (二期规划)
**业务诉求**：实现“千网千面”，不同网站自动加载专属偏好与规则。

**执行判定流**：精准匹配 (专属配置) -> 广泛匹配 (通配符) -> 全局降级 (默认配置)。匹配完成后静默注入规则。
